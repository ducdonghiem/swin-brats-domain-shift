training:
  epochs: 100
  warmup_epochs: 5
  learning_rate: 0.0001
  checkpoint_dir: "checkpoints"
  checkpoint_interval: 20
  log_interval: 10
  batch_size: 2  # Works with embed_dim=32, AMP, and gradient checkpointing
  num_workers: 4
  results_dir: "results"
  use_amp: true  # Use automatic mixed precision to save memory
  gradient_checkpointing: true  # Enable to trade compute for memory

device: "cuda"

data:
  train_dir: "data/processed/brats/train"
  val_dir: "data/processed/brats/val"
  test_dir: "data/processed/brats/test"
  modality_order: ["flair", "t1", "t1ce", "t2"]
  pin_memory: true
  shuffle_train: true

model:
  in_channels: 155
  num_classes: 4
  embed_dim: 32  # Reduced from 48 to fit in H100 memory with batch_size=4
  window_size: 7
  patch_size: 4

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001
  metric: "val_mean_dice"
  mode: "max"