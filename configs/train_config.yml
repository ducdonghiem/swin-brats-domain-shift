training:
  epochs: 100
  warmup_epochs: 5
  learning_rate: 0.0001
  checkpoint_dir: "checkpoints-run3"
  checkpoint_interval: 40
  log_interval: 40
  batch_size: 2
  num_workers: 2
  results_dir: "results"
  use_amp: true
  gradient_checkpointing: false
  hd95_interval: 0

device: "cuda"

# Augmentation is applied on GPU inside the training loop, not in the DataLoader.
# This avoids torchio's CPU SimpleITK resampling (~2-10s/subject) and runs in ~0.05s/batch.
augmentation:
  enabled: true
  flip_prob: 0.4         # free on GPU
  affine_prob: 0.2       # rotation/translation, ~0.01s on GPU vs ~4s on CPU
  affine_degrees: 15
  bias_field_prob: 0.2   # MRI intensity inhomogeneity simulation

data:
  train_dir: "data/processed/brats/train"
  val_dir: "data/processed/brats/val"
  test_dir: "data/processed/brats/test"
  modality_order: ["flair", "t1", "t1ce", "t2"]
  pin_memory: true
  shuffle_train: true

model:
  in_channels: 155
  num_classes: 4
  embed_dim: 32
  window_size: 7
  patch_size: 4

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001
  metric: "val_mean_dice"
  mode: "max"